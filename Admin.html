<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom fonts for this template -->
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:200,200i,300,300i,400,400i,600,600i,700,700i,900,900i" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Merriweather:300,300i,400,400i,700,700i,900,900i" rel="stylesheet">
  <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
  <!-- Custom styles for this template -->
  <link href="css/coming-soon.min.css" rel="stylesheet">
    <title>WWWZ Traders Admin Panel</title>
</head>
<body>
    <div class="mt-5">
      <h2><span class="text text-info m-5 p-2">Admin Panel</span></h2>
      <div class="row">
        <div class="col-3">
          <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
            <a class="nav-link active" id="v-pills-home-tab" data-toggle="pill" href="#v-pills-home" role="tab" aria-controls="v-pills-home" aria-selected="true" id="homeTab">Home</a>
            <a class="nav-link" id="v-pills-profile-tab" data-toggle="pill" href="#v-pills-profile" role="tab" aria-controls="v-pills-profile" aria-selected="false">Add Shipment Details</a>            
          </div>
        </div>
        <div class="col-9">
          <div class="tab-content" id="v-pills-tabContent">
            <div class="tab-pane fade show active" id="v-pills-home" role="tabpanel" aria-labelledby="v-pills-home-tab">
              <div>
                <input class="form-control" placeholder="Enter Consignment Name"  id="consSearch"><span><button onclick="searchCons()" class="btn btn-success mt-2 btn-block">Search</button></span>
                

              </div>   </br></br>
              <div class="jumbotron" id="detailsContainer" style="white-space: pre;">
                
              </div>
              <div class="table table-responsive">
                  <table class="table">
                    <tr>
                      <th></th>
                      <th>Date</th>
                      <th>Consignment Number</th>
                      <th>Location</th>
                      <th>Tracking number</th>
                      <th>Customer number</th>
                      
                      <th>Status</th>
                      <th>Comments</th>
                    </tr>
                    <tbody id="shipments">

                    </tbody>
                  </table>
                 </div>
            </div>
            <div class="tab-pane fade" id="v-pills-profile" role="tabpanel" aria-labelledby="v-pills-profile-tab">
              <div class="alert alert-success" id="successMsg">
                <strong>Tracking # : <span id="trackingNumber"></span></strong> Data saved successfully.
            </div>
    
            <div class="alert alert-danger" id="errorMsg">
                Something went wrong.
            </div>
            <div class="form-group">
              <label for="formGroupExampleInput">Consignment Number</label>
              <input type="text" class="form-control" id="consName" >
             </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Full Name</label>
                  <input type="text" class="form-control" id="name" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Origin City</label>
                  <input type="text" class="form-control" id="oCity" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Origin Country</label>
                  <input type="text" class="form-control" id="oCountry" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Destination City</label>
                  <input type="text" class="form-control" id="dCity" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Zip Code</label>
                  <input type="text" class="form-control" id="zCode" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Destination Country</label>
                  <input type="text" class="form-control" id="dCountry" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">PCS</label>
                  <input type="text" class="form-control" id="pcs" >
                </div>
                <div class="form-group">
                    <label for="formGroupExampleInput">Phone number</label>
                    <input type="tel" class="form-control" id="number" >
                  </div>
                <div class="form-group">
                  <label for="formGroupExampleInput2">Comments</label>
                  <textarea class="form-control" name="" id="details" cols="30" rows=""></textarea>
                </div>
                <div class="form-group">
                    <label for="formGroupExampleInput2">Location</label>
                    <textarea class="form-control" name="" id="address" cols="30" rows=""></textarea>
                  </div>
    
                  <div class="form-group">
                    <button class="btn btn-info btn-block" id="btnSave">Save</button>
                  </div>
            </div>
            
          </div>
        </div>
      </div>











        
        

          
    </div>
    <div class="modal fade" id="changeModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Tracking Details</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="">
            
            <div class="form-group">
              <label for="formGroupExampleInput">Consignment Number</label>
              <input type="text" class="form-control" id="UconsName" >
             </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Full Name</label>
                  <input type="text" class="form-control" id="Uname" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Status</label>
                  <input type="text" class="form-control" id="Ustatus" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Departure Date</label>
                  <input type="datetime" class="form-control" id="UdDate" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Arrival Date</label>
                  <input type="datetime" class="form-control" id="UaDate" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Origin City</label>
                  <input type="text" class="form-control" id="UoCity" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Origin Country</label>
                  <input type="text" class="form-control" id="UoCountry" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Destination City</label>
                  <input type="text" class="form-control" id="UdCity" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Zip Code</label>
                  <input type="text" class="form-control" id="UzCode" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">Destination Country</label>
                  <input type="text" class="form-control" id="UdCountry" >
                </div>
                <div class="form-group">
                  <label for="formGroupExampleInput">PCS</label>
                  <input type="text" class="form-control" id="Upcs" >
                </div>
                <div class="form-group">
                    <label for="formGroupExampleInput">Phone number</label>
                    <input type="tel" class="form-control" id="Unumber" >
                  </div>
                <div class="form-group">
                  <label for="formGroupExampleInput2">Comments</label>
                  <textarea class="form-control" name="" id="Udetails" cols="30" rows=""></textarea>
                </div>
                <div class="form-group">
                    <label for="formGroupExampleInput2">Location</label>
                    <textarea class="form-control" name="" id="Uaddress" cols="30" rows=""></textarea>
                  </div>
    
                  <div class="form-group">
                    <button class="btn btn-info btn-block" id="btnUpdate" onclick="updateData()">Update</button>
                  </div>
          </div>
          
        </div>
      </div>
    </div>




    <div class="modal fade" id="historyModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Tracking Details</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="">
            
            <div class="table table-responsive">
              <table class="table">
                <tr>
                  <th>Date</th>
                  <th>Consignment Number</th>
                  <th>Location</th>
                  
                  <th>Customer number</th>
                  
                  <th>Status</th>
                  <th>Comments</th>
                </tr>
                <tbody id="shipmentHistory">

                </tbody>
              </table>
             </div>
          </div>
          
        </div>
      </div>
    </div>
    <!-- The core Firebase JS SDK is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/7.14.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.14.1/firebase-firestore.js"></script>
    <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- Custom scripts for this template -->
  <script src="js/coming-soon.min.js"></script>
  <script src="js/myapp.js"></script>
  <script src="js/moment.js"></script>
</body>
</html>
